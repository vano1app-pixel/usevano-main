name: Deploy Supabase Edge Functions

# Mirrors what Vercel does for the frontend, but for Supabase edge functions.
# Fires on every merge to main that touches anything under supabase/functions/
# (or this workflow file itself). A `workflow_dispatch` trigger lets you
# re-run it by hand from the Actions tab if something transient fails.
#
# Requires two repo secrets:
#   - SUPABASE_ACCESS_TOKEN  (sbp_... personal access token)
#   - SUPABASE_PROJECT_REF   (the 20-char project id from the project URL)
#
# Migrations are intentionally NOT auto-applied here — they stay manual via
# the SQL Editor since a bad migration on prod is harder to roll back than a
# bad edge function.

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/supabase-deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy every edge function
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          # Iterate every directory under supabase/functions/ and deploy it.
          # The conventional `_shared` folder (if we ever add one for shared
          # code) is skipped — it isn't a function, just library code.
          for dir in supabase/functions/*/; do
            name="$(basename "$dir")"
            if [ "$name" = "_shared" ]; then
              echo "↷ skipping $name (shared code, not a function)"
              continue
            fi
            echo "→ deploying $name"
            supabase functions deploy "$name" \
              --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"
          done
          echo "✅ all functions deployed"
