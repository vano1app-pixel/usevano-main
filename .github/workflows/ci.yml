name: CI

# Gates every push + PR on typecheck, tests, and production build.
# Lint runs as an informational step (non-blocking) because the repo
# has ~170 pre-existing `any`-type warnings we're paying down
# incrementally; breaking every PR on that would just make CI noise.
# Once the `any` cleanup is done, flip lint to blocking.
#
# Matches the Vercel deploy shape — same Node version, same build
# command — so a green CI here means the Vercel preview will build
# too. Keeps preview-deploy failures to actual Vercel-infra issues.

on:
  push:
    branches-ignore:
      # Skip CI on branches that only touch docs / Supabase stuff —
      # add paths here as needed. Default is "run on every branch".
      - 'dependabot/**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

# Cancel previous runs on the same ref when a new commit lands — no
# point spending minutes on a stale commit.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # Dummy Supabase creds so the client boots during `vite build`
      # and the vitest collection. We don't make network calls in CI;
      # the client just needs URL-shaped + non-empty key to instantiate.
      # Production values come from Vercel's project env at deploy time.
      VITE_SUPABASE_URL: http://ci.local.supabase.co
      VITE_SUPABASE_PUBLISHABLE_KEY: ci-anon-key

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Type safety is the first gate — strict tsc now passes clean so
      # every regression shows up here. This catches schema / API drift
      # Vite wouldn't otherwise flag (Vite uses esbuild, not tsc).
      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm test

      # Lint is non-blocking for now — surfaced so devs can see the
      # count + grep for new issues. Remove `continue-on-error` when
      # the `any` cleanup is done.
      - name: Lint (informational)
        run: npm run lint
        continue-on-error: true

      - name: Production build
        run: npm run build
