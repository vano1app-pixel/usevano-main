project_id = "puomfwjtpvqedwxjxogh"

[functions]
  [functions.auth-email-hook]
    verify_jwt = false
  [functions.check-achievements]
    verify_jwt = false
  [functions.notify-matched-students]
    verify_jwt = false
  [functions.smart-match-jobs]
    verify_jwt = false
  [functions.ai-cover-letter]
    verify_jwt = false
  [functions.ai-job-description]
    verify_jwt = false
  [functions.ai-profile-coach]
    verify_jwt = false
  [functions.ai-pricing-advisor]
    verify_jwt = false
  [functions.ai-review-summary]
    verify_jwt = false
  # Stripe can't send a JWT — we verify the Stripe-Signature header instead
  # inside the function. Do NOT flip this to true; it would break every webhook.
  [functions.stripe-webhook]
    verify_jwt = false
  # Called by stripe-webhook with the service-role key. We still pass the
  # service role JWT, but the row status check in the function is the real
  # idempotency guard, so we skip JWT verification at the edge.
  [functions.ai-find-freelancer]
    verify_jwt = false
  # Outreach email to a newly-scouted web freelancer. Called internally
  # by ai-find-freelancer with the service-role key; the idempotent
  # status='new' update inside the function prevents duplicate sends
  # if this is ever invoked twice for the same scout.
  [functions.notify-scouted-freelancer]
    verify_jwt = false
