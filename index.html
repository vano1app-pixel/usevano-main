<!doctype html>
<html lang="en-IE" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VANO — Hand-picked freelancers, paid safely</title>
    <meta name="description" content="€1 AI-matches your freelancer in 20 seconds, or free hand-picked by Vano in 24h. Chat, agree a rate, then pay safely through Vano Pay. Freelancers: list yourself free and get hired directly — videography, content, web design, digital sales." />
    <meta name="author" content="VANO" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1" />
    <!-- Block browser auto-translate (Chrome/Edge): translation extensions wrap
         text nodes in <font> tags and reparent children, orphaning React's refs
         and triggering "Failed to execute 'removeChild' on 'Node'" errors. -->
    <meta name="google" content="notranslate" />
    <link rel="canonical" href="https://vanojobs.com/" />

    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/pwa-192x192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#2563eb" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!--
      Load Google Fonts without blocking first render: preload as style, then
      swap to an actual stylesheet once downloaded. The <noscript> fallback
      covers JS-disabled clients. `display=swap` is already in the URL so text
      renders immediately with the system fallback.
    -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"></noscript>

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="VANO" />
    <meta property="og:locale" content="en_IE" />
    <meta property="og:url" content="https://vanojobs.com/" />
    <meta property="og:title" content="VANO — Hand-picked freelancers, paid safely" />
    <meta property="og:description" content="€1 AI-matches your freelancer in 20 seconds, or free hand-picked by Vano in 24h. Chat, agree a rate, then pay safely through Vano Pay. Freelancers list free." />
    <!-- og:image is 1200x630 PNG per OpenGraph spec. LinkedIn / Slack /
         WhatsApp / Facebook all require raster; the old og.svg failed
         the preview scrapers silently. Keep width + height tags so
         crawlers that don't download the image eagerly still reserve
         the correct card shape. -->
    <meta property="og:image" content="https://vanojobs.com/og.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="VANO — any brief, any budget, your perfect match. Hand-picked freelancers paid safely through Vano." />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="VANO — Hand-picked freelancers, paid safely" />
    <meta name="twitter:description" content="€1 AI-matches your freelancer in 20 seconds, or free hand-picked in 24h. Chat, agree a rate, pay safely through Vano Pay. Freelancers list free." />
    <meta name="twitter:image" content="https://vanojobs.com/og.png" />
    <meta name="twitter:image:alt" content="VANO — any brief, any budget, your perfect match." />

    <!-- Organization & WebSite structured data; rendered server-side so crawlers see it pre-hydration. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://vanojobs.com/#organization",
          "name": "VANO",
          "alternateName": "VANO Jobs",
          "url": "https://vanojobs.com/",
          "logo": "https://vanojobs.com/pwa-512x512.png",
          "image": "https://vanojobs.com/og.png",
          "description": "VANO is a freelance marketplace for Ireland. €1 AI-matches a business with a freelancer in 20 seconds, or hand-picked free by the Vano team in 24h. Payment is held and released safely through Vano Pay. Headquartered in Galway, freelancers + clients Ireland-wide.",
          "areaServed": {
            "@type": "City",
            "name": "Galway",
            "containedInPlace": { "@type": "Country", "name": "Ireland" }
          },
          "address": {
            "@type": "PostalAddress",
            "addressLocality": "Galway",
            "addressCountry": "IE"
          }
        },
        {
          "@type": "WebSite",
          "@id": "https://vanojobs.com/#website",
          "url": "https://vanojobs.com/",
          "name": "VANO",
          "description": "AI match in 20 seconds for €1, or free hand-picked by Vano in 24h. Pay them safely through Vano Pay.",
          "publisher": { "@id": "https://vanojobs.com/#organization" },
          "inLanguage": "en-IE"
        }
      ]
    }
    </script>
  </head>

  <body>
    <div id="root">
      <noscript>
        <h1>VANO — Hire Galway Freelancers</h1>
        <p>VANO connects Galway businesses with local freelancers and student talent for videography, digital sales, web design, social media and more. Post a shift and get the work done.</p>
        <p>This app needs JavaScript to run. Visit <a href="https://vanojobs.com/">vanojobs.com</a> in a modern browser.</p>
      </noscript>
    </div>
    <!-- In-app browser escape hatch. Instagram + Facebook WebViews
         sometimes fail to boot the React bundle (storage
         partitioning, SW quirks). Android: auto-bounce to the system
         default browser via an intent:// URL, which leaves the
         WebView entirely. iOS: no reliable programmatic escape
         (Apple removed x-safari-https around iOS 14), so show a
         prominent banner with a tap-to-copy link instead. Runs inline
         before the module script so even if main.tsx throws, the
         user still has a path out. -->
    <script>
      (function () {
        var ua = navigator.userAgent || '';
        if (!/Instagram|FBAN|FBAV|FB_IAB/i.test(ua)) return;

        var isAndroid = /Android/i.test(ua);

        // Android: force-open the default browser via an intent URL.
        // No package= on the intent so we use whatever the user has
        // set as default (Chrome, Samsung Browser, Firefox, etc).
        // Guard with sessionStorage so a failed intent doesn't loop.
        if (isAndroid) {
          var bouncedKey = 'vano_inapp_bounced';
          var alreadyBounced = false;
          try { alreadyBounced = sessionStorage.getItem(bouncedKey) === '1'; } catch (e) {}
          if (!alreadyBounced) {
            try { sessionStorage.setItem(bouncedKey, '1'); } catch (e) {}
            try {
              var path = location.pathname + location.search + location.hash;
              window.location.href = 'intent://' + location.host + path + '#Intent;scheme=https;end';
              return;
            } catch (e) { /* fall through to banner */ }
          }
        }

        function show() {
          if (document.getElementById('vano-inapp-banner')) return;
          var b = document.createElement('div');
          b.id = 'vano-inapp-banner';
          b.setAttribute('role', 'alert');
          b.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:2147483647;background:#1a2340;color:#f5f0eb;padding:12px 14px 14px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:13px;line-height:1.45;box-shadow:0 2px 12px rgba(0,0,0,0.22);';

          var msg = document.createElement('div');
          msg.style.cssText = 'padding-right:32px;';
          msg.innerHTML = '<strong style="display:block;margin-bottom:2px;font-size:14px;">Open vanojobs in your browser</strong>Tap <strong>⋯</strong> at the corner → <strong>Open in Browser</strong>, or copy the link.';
          b.appendChild(msg);

          var row = document.createElement('div');
          row.style.cssText = 'display:flex;gap:6px;margin-top:8px;align-items:center;';
          var urlBox = document.createElement('span');
          urlBox.textContent = location.host + (location.pathname === '/' ? '' : location.pathname);
          urlBox.style.cssText = 'flex:1;background:rgba(255,255,255,0.08);padding:6px 10px;border-radius:6px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;color:#f5f0eb;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;';
          row.appendChild(urlBox);

          var copy = document.createElement('button');
          copy.type = 'button';
          copy.textContent = 'Copy';
          copy.style.cssText = 'background:#f5f0eb;color:#1a2340;border:0;padding:6px 14px;border-radius:6px;font-weight:600;font-size:12px;cursor:pointer;flex-shrink:0;';
          copy.onclick = function () {
            var full = location.protocol + '//' + location.host + location.pathname + location.search + location.hash;
            var done = function () { copy.textContent = 'Copied'; setTimeout(function(){ copy.textContent = 'Copy'; }, 1800); };
            var fallback = function () {
              try {
                var ta = document.createElement('textarea');
                ta.value = full;
                ta.style.cssText = 'position:fixed;top:-1000px;left:0;opacity:0;';
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                done();
              } catch (e) {}
            };
            try {
              if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(full).then(done, fallback);
              } else { fallback(); }
            } catch (e) { fallback(); }
          };
          row.appendChild(copy);
          b.appendChild(row);

          var x = document.createElement('button');
          x.type = 'button';
          x.setAttribute('aria-label', 'Dismiss');
          x.textContent = '×';
          x.style.cssText = 'position:absolute;top:6px;right:6px;background:transparent;border:0;color:#f5f0eb;font-size:22px;line-height:1;padding:4px 10px;cursor:pointer;opacity:0.85;';
          x.onclick = function () { b.parentNode && b.parentNode.removeChild(b); };
          b.appendChild(x);

          document.body.appendChild(b);
        }
        if (document.body) show();
        else document.addEventListener('DOMContentLoaded', show);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
